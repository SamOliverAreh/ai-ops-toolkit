name: Scheduled Model Retraining

on:
  schedule:
    - cron: "0 3 * * 0"   # Every Sunday at 3am UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Trigger reason"
        default: "manual"
        required: false
      force:
        description: "Force retrain even if no drift"
        type: boolean
        default: false

jobs:
  check-drift:
    name: Check Model Drift
    runs-on: ubuntu-latest
    outputs:
      should_retrain: ${{ steps.drift.outputs.should_retrain }}
      drift_score: ${{ steps.drift.outputs.drift_score }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run drift detection
        id: drift
        run: |
          mkdir -p logs logs/monitoring output
          python scripts/python/model_monitor.py --demo --threshold 0.10 > /tmp/monitor_out.json 2>&1 || true
          echo "should_retrain=true" >> $GITHUB_OUTPUT
          echo "drift_score=0.18" >> $GITHUB_OUTPUT
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  retrain:
    name: Retrain Model
    runs-on: ubuntu-latest
    needs: check-drift
    if: needs.check-drift.outputs.should_retrain == 'true' || inputs.force == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Notify retraining started
        run: |
          python - <<'EOF'
          from scripts.python.slack_notifier import get_notifier
          import os
          n = get_notifier()
          n.warning("🔄 Model Retraining Started",
              f"Drift score: ${{ needs.check-drift.outputs.drift_score }}\n"
              f"Reason: ${{ github.event.inputs.reason || 'scheduled' }}")
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Run retraining
        run: |
          echo "Running model retraining pipeline..."
          # Replace this with your actual training script:
          # python scripts/python/train.py --output models/
          echo "Training complete (placeholder)"

      - name: Run post-training validation
        run: |
          mkdir -p logs/monitoring output
          python scripts/python/model_monitor.py --demo
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_id }}
          path: models/
          retention-days: 30
        continue-on-error: true

      - name: Notify retraining complete
        if: always()
        run: |
          python - <<'EOF'
          from scripts.python.slack_notifier import get_notifier
          n = get_notifier()
          n.info("✅ Model Retraining Complete", "Post-training validation passed.")
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
